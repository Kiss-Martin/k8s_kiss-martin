<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rendező → Film</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: red; }
    select, button { padding: 0.4rem; font-size: 1rem; }
    #result { margin-top: 1rem; font-weight: 600; }
    .list { margin-top: 1rem; }
    .item { margin: 0.25rem 0; }
  </style>
</head>
<body>

  <h1>Rendező → Film</h1>

  <p>Válassz egy rendezőt, hogy megjelenjen a hozzá tartozó film:</p>

  <select id="directorSelect">
    <option value="">-- Válassz rendezőt --</option>
  </select>

  <p id="result">A kiválasztott rendező filmje itt jelenik meg.</p>

  <div class="list">
    <strong>Elérhető rendezők (helyi lista):</strong>
    <div id="localList"></div>
  </div>

  <script>
    // API base — adjust if your backend runs elsewhere
    const API_BASE = 'http://api-k8s-beadando-kiss-martin.jcloud.jedlik.cloud/';

    // Local list must match backend's keys (keeps frontend usable when served statically)
    const directors = [
      'Bong Joon-ho',
      'Chloé Zhao',
      'Sian Heder',
      'Daniel Kwan & Daniel Scheinert',
      'Christopher Nolan'
    ];

    const select = document.getElementById('directorSelect');
    const result = document.getElementById('result');
    const localList = document.getElementById('localList');

    // populate dropdown and local list
    directors.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.innerText = name;
      select.appendChild(opt);

      const div = document.createElement('div');
      div.className = 'item';
      div.innerText = name + ' → (kattints a listából)';
      div.addEventListener('click', () => { select.value = name; fetchMovie(name); });
      localList.appendChild(div);
    });

    select.addEventListener('change', () => {
      const name = select.value;
      if (!name) {
        result.innerText = 'A kiválasztott rendező filmje itt jelenik meg.';
        return;
      }
      fetchMovie(name);
    });

    async function fetchMovie(name) {
      result.innerText = 'Betöltés...';
      try {
        const res = await fetch(`${API_BASE}/director/${encodeURIComponent(name)}`);
        const data = await res.json();
        if (data.error) {
          result.innerText = data.error;
        } else {
          result.innerText = `Rendező: ${data.director} — Film: ${data.movie}`;
        }
      } catch (err) {
        result.innerText = 'Hiba a kapcsolódás során. Ellenőrizd a backend elérhetőségét.';
      }
    }
  </script>

</body>
</html>
